name: Noon Scraper - Account 6 (20 parallel)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  scrape:
    name: "Noon slice ${{ matrix.slice }}/80"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - { slice: 60 }
          - { slice: 61 }
          - { slice: 62 }
          - { slice: 63 }
          - { slice: 64 }
          - { slice: 65 }
          - { slice: 66 }
          - { slice: 67 }
          - { slice: 68 }
          - { slice: 69 }
          - { slice: 70 }
          - { slice: 71 }
          - { slice: 72 }
          - { slice: 73 }
          - { slice: 74 }
          - { slice: 75 }
          - { slice: 76 }
          - { slice: 77 }
          - { slice: 78 }
          - { slice: 79 }

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: pip install curl-cffi
      - name: Stagger start
        run: sleep $((RANDOM % 10 + 2))
      - name: Scrape
        run: python noon_spider.py --slice ${{ matrix.slice }} --total-slices 80 --limit 99999
        timeout-minutes: 50
      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: noon-slice-${{ matrix.slice }}
          path: noon_products_*.json
          if-no-files-found: warn

  export:
    name: Merge and Push
    needs: scrape
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Download all
        uses: actions/download-artifact@v4
        with:
          pattern: noon-slice-*
          merge-multiple: true
      - name: Merge
        run: |
          python -c "
          import json, csv, glob, sys
          sys.stdout.reconfigure(encoding='utf-8', errors='replace')
          products, seen = [], set()
          for f in sorted(glob.glob('noon_products_*.json')):
              try:
                  data = json.loads(open(f, encoding='utf-8').read())
                  for p in data:
                      pid = p.get('product_id','')
                      if pid and pid not in seen:
                          seen.add(pid)
                          products.append(p)
                  print(f'{f}: {len(data)} raw, total unique: {len(products)}')
              except: pass
          print(f'TOTAL: {len(products)} unique products')
          if not products: sys.exit(0)
          cols = list(products[0].keys())
          with open('noon_products.csv', 'w', encoding='utf-8-sig', newline='') as f:
              w = csv.DictWriter(f, fieldnames=cols, extrasaction='ignore')
              w.writeheader()
              w.writerows(products)
          "
      - name: Push
        if: always()
        env:
          MASTER_TOKEN: ${{ secrets.MASTER_REPO_TOKEN }}
          MASTER_OWNER: ${{ secrets.MASTER_REPO_OWNER }}
        run: |
          if [ -z "$MASTER_TOKEN" ] || [ ! -f noon_products.csv ]; then exit 0; fi
          git clone https://$MASTER_TOKEN@github.com/$MASTER_OWNER/scraped-products-master.git mr
          mkdir -p mr/data/account6/
          cp noon_products.csv mr/data/account6/noon_products.csv
          cd mr && git config user.name "bot" && git config user.email "bot@noreply.com"
          git add . && git diff --cached --quiet && exit 0
          git commit -m "Noon account6 - $(date +%Y-%m-%d)"
          for i in 1 2 3 4 5; do git pull --rebase origin main && git push && break || sleep 10; done
