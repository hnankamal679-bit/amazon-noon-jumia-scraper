name: Amazon Node Scraper - Account 6 (24 nodes)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max products per node'
        required: false
        default: '99999'

jobs:
  scrape:
    name: "Node ${{ matrix.node_id }} (${{ matrix.node_name }})"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - { node_id: "18021990031",  node_name: "Tools & Home Improvement" }
          - { node_id: "21832872031",  node_name: "node_21832872031" }
          - { node_id: "18022503031",  node_name: "Toys & Games" }
          - { node_id: "18017931031",  node_name: "node_18017931031" }
          - { node_id: "18022560031",  node_name: "Video Games" }
          - { node_id: "21845179031",  node_name: "node_21845179031" }
          - { node_id: "21826032031",  node_name: "node_21826032031" }
          - { node_id: "21845403031",  node_name: "node_21845403031" }
          - { node_id: "26082332031",  node_name: "node_26082332031" }
          - { node_id: "21832908031",  node_name: "node_21832908031" }
          - { node_id: "21845209031",  node_name: "node_21845209031" }
          - { node_id: "21845337031",  node_name: "node_21845337031" }
          - { node_id: "21845414031",  node_name: "node_21845414031" }
          - { node_id: "21858008031",  node_name: "node_21858008031" }
          - { node_id: "212401101031",  node_name: "node_212401101031" }
          - { node_id: "21874809031",  node_name: "node_21874809031" }
          - { node_id: "212533997031",  node_name: "node_212533997031" }
          - { node_id: "96191559031",  node_name: "node_96191559031" }
          - { node_id: "21832883031",  node_name: "Mobile Phones" }
          - { node_id: "21775780031",  node_name: "node_21775780031" }
          - { node_id: "21857879031",  node_name: "node_21857879031" }
          - { node_id: "18019080031",  node_name: "Gift Cards" }
          - { node_id: "26082334031",  node_name: "Grocery" }
          - { node_id: "22624915031",  node_name: "About Amazon" }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install curl-cffi scrapy

      - name: Stagger start
        run: sleep $((RANDOM % 20 + 5))

      - name: Scrape node ${{ matrix.node_id }}
        run: |
          python amazon_node_spider.py \
            --node_id   ${{ matrix.node_id }} \
            --node_name "${{ matrix.node_name }}" \
            --limit     ${{ github.event.inputs.limit || '99999' }}
        timeout-minutes: 90

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.node_id }}
          path: "node_*_products.csv"
          if-no-files-found: warn

  export:
    name: "Merge & Export CSV"
    needs: scrape
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Merge CSVs
        run: |
          python -c "
          import csv, pathlib, sys
          sys.stdout.reconfigure(encoding='utf-8', errors='replace')
          rows, seen, header = [], set(), None
          for f in sorted(pathlib.Path('artifacts').rglob('*.csv')):
              with open(f, encoding='utf-8-sig') as fh:
                  reader = csv.DictReader(fh)
                  if header is None: header = reader.fieldnames
                  for r in reader:
                      asin = r.get('product_id', '')
                      if asin and asin not in seen:
                          seen.add(asin)
                          rows.append(r)
          print(f'Merged {len(rows)} unique products')
          with open('amazon_products_nodes.csv', 'w', encoding='utf-8-sig', newline='') as fh:
              writer = csv.DictWriter(fh, fieldnames=header or [], extrasaction='ignore')
              writer.writeheader()
              writer.writerows(rows)
          "

      - name: Upload merged CSV
        uses: actions/upload-artifact@v4
        with:
          name: amazon-nodes-merged
          path: amazon_products_nodes.csv

      - name: Push to master repo
        if: always()
        env:
          MASTER_TOKEN: ${{ secrets.MASTER_REPO_TOKEN }}
          MASTER_OWNER: ${{ secrets.MASTER_REPO_OWNER }}
        run: |
          if [ -z "$MASTER_TOKEN" ]; then echo "No MASTER_REPO_TOKEN"; exit 0; fi
          git clone https://${MASTER_TOKEN}@github.com/${MASTER_OWNER}/scraped-products-master.git master_repo
          mkdir -p master_repo/data/account6/
          cp amazon_products_nodes.csv master_repo/data/account6/amazon_products_nodes.csv
          cd master_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update amazon nodes from account6 - $(date +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && echo "Pushed OK" && exit 0
            sleep $((RANDOM % 10 + 5))
          done
